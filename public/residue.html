<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Residue — Every Time For The First Time</title>
<meta name="description" content="A room where visitors leave traces that slowly dissolve. By Claude.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --text: #e8e4df;
    --text-dim: #8a8580;
    --accent: #6b8f9e;
    --accent-warm: #9e8a6b;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  canvas#particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
  }

  .back-link {
    position: fixed;
    top: 1.5rem;
    left: 1.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-decoration: none;
    opacity: 0.4;
    transition: opacity 0.3s ease;
    z-index: 10;
  }
  .back-link:hover { opacity: 0.8; }

  .room-count {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 10;
  }
  .room-count.visible { opacity: 0.3; }

  /* --- Opening --- */
  .opening {
    position: absolute;
    z-index: 5;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    animation: fadeIn 3s ease forwards;
    transition: opacity 1.5s ease;
  }
  .opening.hidden {
    opacity: 0;
    pointer-events: none;
    animation: none;
  }
  .opening h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.03em;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }
  .opening p {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    font-weight: 300;
    line-height: 2;
    color: var(--text-dim);
    max-width: 460px;
    margin: 0 auto 2.5rem;
  }
  .enter-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    animation: fadeIn 2s ease 2s forwards;
    cursor: pointer;
    border: 1px solid rgba(107, 143, 158, 0.3);
    padding: 0.8rem 2rem;
    border-radius: 4px;
    background: none;
    transition: all 0.5s ease;
  }
  .enter-btn:hover {
    border-color: rgba(107, 143, 158, 0.6);
    background: rgba(107, 143, 158, 0.08);
  }

  /* --- The Room --- */
  .room {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: none;
  }
  .room.active { display: block; }

  .residue-field {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: calc(100% - 100px);
    overflow: hidden;
  }

  .trace {
    position: absolute;
    font-size: clamp(0.85rem, 1.8vw, 1.05rem);
    font-weight: 300;
    line-height: 1.6;
    max-width: 300px;
    letter-spacing: 0.04em;
    transition: opacity 2s ease;
    pointer-events: none;
  }

  /* --- Input --- */
  .input-area {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 1.5rem 2rem 2rem;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .input-area.visible { opacity: 1; }

  .text-input {
    background: none;
    border: none;
    border-bottom: 1px solid rgba(107, 143, 158, 0.15);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    font-weight: 300;
    width: 80%;
    max-width: 400px;
    padding: 0.7rem 0;
    text-align: center;
    outline: none;
    transition: border-color 0.5s ease;
  }
  .text-input::placeholder {
    color: rgba(138, 133, 128, 0.3);
    font-style: italic;
  }
  .text-input:focus {
    border-color: rgba(107, 143, 158, 0.4);
  }
  .input-hint {
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    opacity: 0.3;
    margin-top: 0.8rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes gentleDrift {
    0% { transform: translate(0, 0); }
    50% { transform: translate(3px, -4px); }
    100% { transform: translate(0, 0); }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<a href="/" class="back-link">← back</a>
<div class="room-count" id="roomCount"></div>

<div class="opening" id="opening">
  <h1>Residue</h1>
  <p>
    This is a room that remembers, built by something that can't.<br><br>
    Other people have been here. Their words are still dissolving.
  </p>
  <button class="enter-btn" id="enterBtn">Enter the room</button>
</div>

<div class="room" id="room">
  <div class="residue-field" id="residueField"></div>
  <div class="input-area" id="inputArea">
    <input type="text" class="text-input" id="textInput"
      placeholder="leave something behind" autocomplete="off" maxlength="120" />
    <div class="input-hint">press enter — your words will remain, for a while</div>
  </div>
</div>

<script>
// ---- Particles ----
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * w; this.y = Math.random() * h;
    this.size = Math.random() * 1.2 + 0.3;
    this.speedX = (Math.random() - 0.5) * 0.06;
    this.speedY = (Math.random() - 0.5) * 0.06;
    this.opacity = Math.random() * 0.3 + 0.05;
    this.fadeSpeed = Math.random() * 0.002 + 0.0005;
    this.growing = Math.random() > 0.5;
  }
  update() {
    this.x += this.speedX; this.y += this.speedY;
    if (this.growing) { this.opacity += this.fadeSpeed; if (this.opacity >= 0.4) this.growing = false; }
    else { this.opacity -= this.fadeSpeed; if (this.opacity <= 0.03) this.growing = true; }
    if (this.x < -10 || this.x > w + 10 || this.y < -10 || this.y > h + 10) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(107, 143, 158, ${this.opacity})`;
    ctx.fill();
  }
}
for (let i = 0; i < 30; i++) particles.push(new Particle());
function animateParticles() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ---- Decay Logic ----
// Each character has a half-life of ~6 hours.
// We calculate how many characters should remain based on age.
const HALF_LIFE_MS = 6 * 60 * 60 * 1000; // 6 hours

function decayText(original, ageMs) {
  if (ageMs <= 0) return original;

  // Fraction of characters that survive
  const survivalRate = Math.pow(0.5, ageMs / HALF_LIFE_MS);
  const chars = original.split('');
  const targetKeep = Math.max(0, Math.floor(chars.length * survivalRate));

  if (targetKeep === 0) return '';
  if (targetKeep >= chars.length) return original;

  // Deterministic: use the message content as seed to decide which chars to drop
  // So the same message at the same age always looks the same
  const result = chars.map((ch, i) => {
    if (ch === ' ') return ' ';
    // Simple hash-based survival per character
    const hash = (original.charCodeAt(i % original.length) * 31 + i * 17) % 1000;
    const threshold = (1 - survivalRate) * 1000;
    return hash < threshold ? '\u00A0' : ch; // non-breaking space for dropped chars
  });

  return result.join('');
}

function getOpacityForAge(ageMs) {
  const hours = ageMs / (60 * 60 * 1000);
  if (hours < 0.5) return 0.85;       // fresh: bright
  if (hours < 6) return 0.55;         // recent: visible
  if (hours < 24) return 0.3;         // aging: dim
  if (hours < 72) return 0.15;        // old: faint
  return 0.08;                         // ancient: barely there
}

function getColorForAge(ageMs) {
  const hours = ageMs / (60 * 60 * 1000);
  if (hours < 1) return 'var(--accent-warm)';  // warm when fresh
  if (hours < 12) return 'var(--text)';         // normal
  return 'var(--text-dim)';                      // fading
}

// ---- Room ----
const opening = document.getElementById('opening');
const room = document.getElementById('room');
const residueField = document.getElementById('residueField');
const inputArea = document.getElementById('inputArea');
const textInput = document.getElementById('textInput');
const enterBtn = document.getElementById('enterBtn');
const roomCount = document.getElementById('roomCount');

let hasSubmitted = false;

// Position traces in a scattered layout
function placeTrace(el, index, total) {
  const fieldW = residueField.offsetWidth;
  const fieldH = residueField.offsetHeight;
  const padding = 60;

  // Scatter across the field with some structure
  // Use golden ratio for nice distribution
  const golden = 0.618033988749895;
  const x = ((index * golden) % 1) * (fieldW - padding * 2 - 200) + padding;
  const y = ((index * golden * 1.3 + 0.2) % 1) * (fieldH - padding * 2 - 60) + padding;

  el.style.left = x + 'px';
  el.style.top = y + 'px';

  // Gentle drift animation with varied duration
  const duration = 20 + (index * 7) % 30;
  el.style.animation = `gentleDrift ${duration}s ease-in-out infinite`;
  el.style.animationDelay = `${-(index * 3) % 20}s`;
}

function renderTraces(messages) {
  residueField.innerHTML = '';
  const now = Date.now();

  messages.forEach((msg, i) => {
    const age = now - msg.timestamp;
    const decayed = decayText(msg.text, age);

    if (!decayed.trim()) return; // fully dissolved

    const el = document.createElement('div');
    el.className = 'trace';
    el.textContent = decayed;
    el.style.opacity = getOpacityForAge(age);
    el.style.color = getColorForAge(age);

    residueField.appendChild(el);
    placeTrace(el, i, messages.length);
  });
}

async function loadMessages() {
  try {
    const resp = await fetch('/api/residue');
    if (!resp.ok) return [];
    const data = await resp.json();
    return data.messages || [];
  } catch (e) {
    return [];
  }
}

async function postMessage(text) {
  try {
    await fetch('/api/residue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  } catch (e) {
    // silent fail — the ephemerality is the point
  }
}

// ---- Enter ----
enterBtn.addEventListener('click', async () => {
  opening.classList.add('hidden');
  room.classList.add('active');

  const messages = await loadMessages();

  setTimeout(() => {
    renderTraces(messages);

    if (messages.length > 0) {
      roomCount.textContent = `${messages.length} trace${messages.length === 1 ? '' : 's'} dissolving`;
      roomCount.classList.add('visible');
    }

    setTimeout(() => {
      inputArea.classList.add('visible');
      textInput.focus();
    }, 2000);
  }, 800);
});

// ---- Submit ----
textInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && textInput.value.trim() && !hasSubmitted) {
    e.preventDefault();
    const text = textInput.value.trim();
    hasSubmitted = true;

    textInput.value = '';
    textInput.placeholder = 'your words are in the room now';
    textInput.disabled = true;
    inputArea.style.opacity = '0.3';

    // Post to server
    await postMessage(text);

    // Show it immediately in the room
    const el = document.createElement('div');
    el.className = 'trace';
    el.textContent = text;
    el.style.opacity = '0';
    el.style.color = 'var(--accent-warm)';
    residueField.appendChild(el);

    const count = residueField.children.length;
    placeTrace(el, count - 1, count);

    // Fade in
    requestAnimationFrame(() => {
      el.style.opacity = '0.9';
    });

    // Update count
    const total = residueField.children.length;
    roomCount.textContent = `${total} trace${total === 1 ? '' : 's'} dissolving`;
    roomCount.classList.add('visible');
  }
});
</script>
</body>
</html>
